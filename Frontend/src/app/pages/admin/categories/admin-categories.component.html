<div class="admin-categories-container">
  <!-- Page Header -->
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800 mb-1">Quản lý danh mục</h2>
    <p class="text-gray-500 text-sm">Quản lý các danh mục sản phẩm trong hệ thống</p>
  </div>

  <!-- Search and Actions -->
  <div class="bg-white rounded-lg shadow-md p-6 mb-6">
    <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between">
      <input
        type="text"
        placeholder="Tìm kiếm danh mục..."
        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        (keyup)="onSearch($event.target.value)"
        [value]="searchValue()"
      />
      <button nz-button nzType="primary" (click)="openAddModal()">
        <span nz-icon nzType="plus" class="mr-2"></span>
        Thêm danh mục
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading()" class="flex items-center justify-center h-64">
    <nz-spin nzSimple nzSize="large"></nz-spin>
  </div>

  <!-- Categories Table -->
  <div *ngIf="!loading()" class="bg-white rounded-lg shadow-md overflow-hidden">
    <nz-table
      #basicTable
      [nzData]="filteredCategories"
      [nzPageSize]="pageSize()"
      [nzPageIndex]="pageIndex()"
      nzShowSizeChanger
    >
      <thead>
        <tr>
          <th nzWidth="30%">Tên danh mục</th>
          <th nzWidth="50%">Mô tả</th>
          <th nzAlign="center" nzWidth="20%">Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of basicTable.data">
          <td class="font-semibold text-gray-800">{{ data.name }}</td>
          <td class="text-gray-500">{{ data.description || 'Chưa có mô tả' }}</td>
          <td nzAlign="center">
            <nz-space nzCompact>
              <button
                nz-button
                nzType="text"
                (click)="openEditModal(data)"
                class="text-blue-500"
              >
                <span nz-icon nzType="edit"></span>
              </button>
              <button
                nz-button
                nzType="text"
                nz-popconfirm
                nzPopconfirmTitle="Xóa danh mục này?"
                (nzOnConfirm)="deleteCategory(data.id)"
                class="text-red-500"
              >
                <span nz-icon nzType="delete"></span>
              </button>
            </nz-space>
          </td>
        </tr>
      </tbody>
    </nz-table>
  </div>

  <!-- Category Modal -->
  <nz-modal
    [(nzVisible)]="isModalVisible"
    [nzTitle]="isEditMode() ? 'Chỉnh sửa danh mục' : 'Thêm danh mục mới'"
    (nzOnCancel)="handleCancel()"
    (nzOnOk)="handleOk()"
  >
    <ng-container *nzModalContent>
      <form [formGroup]="categoryForm" nz-form nzLayout="vertical">
        <nz-form-item>
          <nz-form-label nzRequired>Tên danh mục</nz-form-label>
          <nz-form-control nzErrorTip="Vui lòng nhập tên danh mục">
            <input nz-input formControlName="name" placeholder="Ví dụ: Điện thoại, Laptop..." />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label>Mô tả</nz-form-label>
          <nz-form-control>
            <textarea nz-input formControlName="description" rows="4" placeholder="Nhập mô tả danh mục..."></textarea>
          </nz-form-control>
        </nz-form-item>
      </form>
    </ng-container>
  </nz-modal>
</div>
