<nz-layout class="admin-container h-screen">
  <!-- Sider Navigation -->
  <nz-sider class="admin-sider" nzCollapsible [nzCollapsed]="isCollapsed()" [nzWidth]="256" [nzCollapsedWidth]="72"
    [nzBreakpoint]="'lg'" [nzTheme]="'dark'">
    <!-- Logo -->
    <div class="admin-logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6366f1"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <span *ngIf="!isCollapsed()" class="logo-text">Admin E-Commerce</span>
    </div>

    <!-- Menu -->
    <ul nz-menu nzTheme="dark" nzMode="inline" class="admin-nav-menu">
      <li *ngFor="let item of menuItems" nz-menu-item [routerLink]="item.path" [routerLinkActive]="'active-menu-item'"
        [nz-tooltip]="isCollapsed() ? item.label : ''" nzTooltipPlacement="right">
        <span class="menu-icon" [innerHTML]="item.svgIcon"></span>
        <span *ngIf="!isCollapsed()" class="menu-label">{{ item.label }}</span>
      </li>
    </ul>

    <!-- Bottom logout -->
    <div class="sidebar-footer" *ngIf="!isCollapsed()">
      <button class="logout-btn" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Đăng xuất</span>
      </button>
    </div>
  </nz-sider>

  <!-- Main Layout -->
  <nz-layout class="admin-main-layout">
    <!-- Header -->
    <nz-header class="admin-header">
      <div class="header-left">
        <!-- Toggle Sidebar -->
        <button class="icon-btn toggle-btn" (click)="toggleSidebar()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <!-- Back Home Button -->
        <a routerLink="/home" class="back-home-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span>Trang chủ</span>
        </a>

        <div class="header-divider"></div>
        <h1 class="header-title">Hệ Thống Quản Trị</h1>
      </div>

      <!-- User Menu -->
      <div class="header-right">
        <!-- Notifications -->
        <button class="icon-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </button>

        <div class="user-avatar-wrap" nz-dropdown [nzDropdownMenu]="dropdownMenu" nzTrigger="click">
          <nz-avatar [nzSrc]="currentUser()?.avatar || ''" [nzSize]="38" nzGap="4" class="user-avatar">{{
            currentUser()?.name?.charAt(0)?.toUpperCase() || 'A' }}</nz-avatar>
          <div class="user-info">
            <span class="user-name">{{ currentUser()?.name }}</span>
            <span class="user-role">Administrator</span>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9l6 6 6-6" />
          </svg>
        </div>

        <nz-dropdown-menu #dropdownMenu="nzDropdownMenu">
          <ul nz-menu class="user-dropdown-menu">
            <li nz-menu-item routerLink="/admin/profile">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <span>Thông tin tài khoản</span>
            </li>
            <li nz-menu-divider></li>
            <li nz-menu-item (click)="logout()" class="logout-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
              <span>Đăng xuất</span>
            </li>
          </ul>
        </nz-dropdown-menu>
      </div>
    </nz-header>

    <!-- Content -->
    <nz-content class="admin-content bg-gray-50 overflow-auto flex-1">
      <router-outlet></router-outlet>
    </nz-content>
  </nz-layout>
</nz-layout>
