<div class="auth-page">
    <div class="auth-card">
        <!-- Visual Side -->
        <div class="auth-left" #auth3dContainer>
            <!-- Overlay and branding go on top (z-index 10) -->
            <div class="overlay" style="z-index: 5; pointer-events: none;"></div>
            <div class="branding">
                <div class="logo">AMU</div>
            </div>
            <div class="content-overlay">
                <h2>Join Our<br>Community</h2>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-right">
            <div class="form-header">
                <div class="status-badge">
                    <span class="pulse"></span>
                    <span>Tạo tài khoản mới</span>
                </div>
                <h1>Đăng ký</h1>
                <p>Tham gia cùng chúng tôi ngay hôm nay</p>
            </div>

            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Họ</label>
                        <div class="input-container">
                            <span nz-icon nzType="user" class="icon"></span>
                            <input type="text" placeholder="Họ của bạn" formControlName="firstname" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Tên</label>
                        <div class="input-container">
                            <span nz-icon nzType="user" class="icon"></span>
                            <input type="text" placeholder="Tên của bạn" formControlName="lastname" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Địa chỉ Email</label>
                    <div class="input-container">
                        <span nz-icon nzType="mail" class="icon"></span>
                        <input type="email" placeholder="example@email.com" formControlName="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Mật khẩu</label>
                    <div class="input-container">
                        <span nz-icon nzType="lock" class="icon"></span>
                        <input [type]="passwordVisible ? 'text' : 'password'" placeholder="••••••••"
                            formControlName="password" required>
                        <span nz-icon [nzType]="passwordVisible ? 'eye-invisible' : 'eye'"
                            (click)="passwordVisible = !passwordVisible"
                            style="position: absolute; right: 24px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #d1d5db;"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Xác nhận mật khẩu</label>
                    <div class="input-container">
                        <span nz-icon nzType="check-circle" class="icon"></span>
                        <input [type]="confirmPasswordVisible ? 'text' : 'password'" placeholder="••••••••"
                            formControlName="confirmPassword" required>
                        <span nz-icon [nzType]="confirmPasswordVisible ? 'eye-invisible' : 'eye'"
                            (click)="confirmPasswordVisible = !confirmPasswordVisible"
                            style="position: absolute; right: 24px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #d1d5db;"></span>
                    </div>
                </div>

                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="terms" formControlName="agree"
                        class="w-4 h-4 rounded border-gray-200 accent-black">
                    <label for="terms" class="text-xs font-bold text-gray-400 cursor-pointer">Tôi đồng ý với các <span
                            class="text-black underline cursor-help">Điều khoản dịch vụ</span></label>
                </div>

                <button type="submit" class="btn-main" [disabled]="loading">
                    @if (loading) {
                    <span nz-icon nzType="loading"></span>
                    } @else {
                    Đăng ký ngay
                    }
                </button>

                <div class="auth-footer">
                    Đã có tài khoản? <a routerLink="/login">Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>
</div>
