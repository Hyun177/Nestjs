<div class="auth-page">
    <div class="auth-card">
        <!-- Visual Side -->
        <div class="auth-left">
            <img [src]="'/' + images[currentIndex]" class="slider-img" [class.zoom-effect]="true" alt="Banner">
            <div class="overlay"></div>
            <div class="branding">
                <div class="logo">AMU</div>
            </div>
            <div class="content-overlay">
                <h2>Welcome<br>Back</h2>
                <div class="dots">
                    @for (img of images; track $index) {
                    <span class="dot" [class.active]="$index === currentIndex" (click)="setSlide($index)"></span>
                    }
                </div>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-right">
            <div class="form-header">
                <div class="status-badge">
                    <span class="pulse"></span>
                    <span>Hệ thống an toàn</span>
                </div>
                <h1>Đăng nhập</h1>
                <p>Tiếp tục hành trình của bạn</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-container">
                        <span nz-icon nzType="mail" class="icon"></span>
                        <input type="email" placeholder="example@email.com" formControlName="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="flex justify-between items-center pr-2">
                        <label>Mật khẩu</label>
                        <button
                          type="button"
                          class="text-[10px] font-black uppercase tracking-widest text-gray-900 hover:text-blue-600 transition-colors"
                          style="background: transparent; border: none; padding: 0; cursor: pointer;"
                        >
                          Quên mật khẩu?
                        </button>
                    </div>
                    <div class="input-container">
                        <span nz-icon nzType="lock" class="icon"></span>
                        <input [type]="passwordVisible ? 'text' : 'password'" placeholder="••••••••" formControlName="password" required>
                        <span nz-icon [nzType]="passwordVisible ? 'eye-invisible' : 'eye'" 
                              (click)="passwordVisible = !passwordVisible"
                              style="position: absolute; right: 24px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #d1d5db;"></span>
                    </div>
                </div>

                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="rem" class="w-4 h-4 rounded border-gray-200 accent-black">
                    <label for="rem" class="text-xs font-bold text-gray-500 cursor-pointer">Ghi nhớ tôi</label>
                </div>

                <button type="submit" class="btn-main" [disabled]="loading">
                    @if (loading) {
                        <span nz-icon nzType="loading"></span>
                    } @else {
                        Đăng nhập ngay
                    }
                </button>

                <div style="margin-top: 14px; display: flex; justify-content: center;">
                    <div id="googleSignInButton"></div>
                </div>

                <div class="auth-footer">
                    Chưa có tài khoản? <a routerLink="/register">Đăng ký ngay</a>
                </div>
            </form>
        </div>
    </div>
</div>
